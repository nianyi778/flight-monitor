services:
  # VPS/Docker 场景下使用可视化 Chromium：
  # 1. 浏览器页面通过 https://<host>:3001 访问
  # 2. 持久化 /config 复用登录态与风控 cookie
  # 3. 通过 9222 暴露 CDP，供 flight-monitor 连接
  chrome:
    image: lscr.io/linuxserver/chromium:latest
    container_name: flight-chrome
    restart: unless-stopped
    shm_size: "1gb"
    security_opt:
      - seccomp=unconfined
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Tokyo}
      - CUSTOM_USER=${CHROME_GUI_USER:-}
      - PASSWORD=${CHROME_GUI_PASSWORD:-}
      - CHROME_CLI=--remote-debugging-address=0.0.0.0 --remote-debugging-port=9222 --user-data-dir=/config/chrome-profile
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - chrome-data:/config
      - ./docker/chrome-autostart.sh:/config/.config/openbox/autostart:ro
    deploy:
      resources:
        limits:
          memory: 1G

  flight-monitor:
    build: .
    image: ghcr.io/nianyi778/flight-monitor:v5.1
    container_name: flight-monitor
    restart: unless-stopped
    depends_on:
      - chrome
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      # Telegram
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
      - TG_CHAT_ID=${TG_CHAT_ID}
      - TG_GROUP_IDS=${TG_GROUP_IDS:-}
      # 数据库
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-4000}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-flight_monitor}
      # 调度
      - CHECK_INTERVAL=${CHECK_INTERVAL:-3600}
      - PUSH_INTERVAL=${PUSH_INTERVAL:-3600}
      # 代理（可选）
      - PROXY_URL=${PROXY_URL:-}
      # LetsFG（可选：有 key 走云搜索，无 key 走本地 connectors）
      - LETSFG_API_KEY=${LETSFG_API_KEY:-}
      - LETSFG_MODE=${LETSFG_MODE:-auto}
      - LETSFG_TIMEOUT=${LETSFG_TIMEOUT:-90}
      # 携程抓取：优先 API，失败时通过同 compose 内的可视化 Chromium 做 DOM fallback
      - CTRIP_CDP_PORT=chrome:9223
      - CTRIP_ENABLE_BROWSER_FALLBACK=1
      # MCP Server
      - MCP_ENABLED=${MCP_ENABLED:-true}
      - MCP_PORT=${MCP_PORT:-8081}
    volumes:
      - ./main.py:/app/main.py
      - ./app:/app/app
      - ./data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  chrome-data:
