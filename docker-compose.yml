services:
  # 携程 DOM 抓取专用 headless Chrome（CDP on :9222）
  chrome:
    image: chromedp/headless-shell:latest
    container_name: flight-chrome
    restart: unless-stopped
    shm_size: "256m"
    security_opt:
      - seccomp=unconfined
    deploy:
      resources:
        limits:
          memory: 512M

  flight-monitor:
    image: ghcr.io/nianyi778/flight-monitor:v4.6
    # 本地构建时改用: build: .
    container_name: flight-monitor
    restart: unless-stopped
    depends_on:
      - chrome
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      # Telegram
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
      - TG_CHAT_ID=${TG_CHAT_ID}
      - TG_GROUP_IDS=${TG_GROUP_IDS:-}
      # 数据库
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-4000}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-flight_monitor}
      # 调度
      - CHECK_INTERVAL=${CHECK_INTERVAL:-3600}
      - PUSH_INTERVAL=${PUSH_INTERVAL:-3600}
      # 代理（可选）
      - PROXY_URL=${PROXY_URL:-}
      # 携程 DOM 抓取：连接同 compose 内的 chrome 容器
      - CTRIP_CDP_PORT=chrome:9222
      # MCP Server
      - MCP_ENABLED=${MCP_ENABLED:-true}
      - MCP_PORT=${MCP_PORT:-8081}
    volumes:
      - flight-data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  flight-data:
